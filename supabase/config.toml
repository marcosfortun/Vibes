# Supabase local config — Vibes
# Aplica con: supabase start (requiere Docker) y supabase db reset para correr migraciones.
project_id = "vibecheck"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = false
port = 54323

# Storage no se usa en el MVP; desactivado para evitar el health check que rompe el arranque local.
[storage]
enabled = false

# Analítica (Logflare/Vector) no necesaria para el backend; desactivada por health checks inestables en local.
[analytics]
enabled = false

# Realtime no se usa (sin WebSockets en el diseño); desactivado por health check inestable en local.
[realtime]
enabled = false

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

# Sesiones de larga duración: no caducan por inactividad ni por tiempo (el usuario
# entra por OTP, copiar el código a menudo es incómodo). En prod se replica en el
# panel: Authentication > Sessions (time-box e inactivity = nunca).
[auth.sessions]
timebox = "0h"
inactivity_timeout = "0h"

[auth.email]
enable_signup = true
# Sin contraseñas: el alta y el acceso son por Email OTP (código de 8 dígitos). El
# propio OTP valida la propiedad del correo, así que no hace falta doble opt-in.
enable_confirmations = false
otp_length = 8
otp_expiry = 3600
# Anti-spam por usuario: tiempo mínimo entre envíos de OTP al mismo correo.
max_frequency = "60s"
# NOTA despliegue: "Enable email enumeration prevention" es un flag del panel cloud
# (Authentication > Auth Providers > Email), no de config.toml local. Replicar también
# otp_length=8, otp_expiry=3600 y el "Minimum interval between emails" = 60s.

# Límites de tasa (anti-spam y anti-fuerza bruta). En prod, replicar en el panel
# (Authentication > Rate Limits).
[auth.rate_limit]
# Correos enviados por hora (incluye OTP): frena el envío masivo.
email_sent = 10
# Verificaciones de token/OTP por IP cada 5 min: frena la fuerza bruta del código.
token_verifications = 30

# Correos de GoTrue (el código OTP de alta/acceso). Una sola plantilla corporativa
# en la skin por defecto (Stick stack): en el alta el usuario aún no ha elegido skin
# y GoTrue no conoce la skin de cada usuario. Muestra {{ .Token }} (código), no enlace.
# NOTA despliegue: replicar asunto + HTML y el remitente "Vibes <no-reply@vibes.oneman.es>"
# en el panel (Authentication > Emails > Magic Link y Confirm signup).
[auth.email.template.magic_link]
subject = "Tu código de acceso a Vibes ⚡"
content_path = "./supabase/templates/otp.html"

[auth.email.template.confirmation]
subject = "Tu código de acceso a Vibes ⚡"
content_path = "./supabase/templates/otp.html"

# ─────────────────────────────────────────────────────────────────────────────
# Send Email Hook (OTP per-skin / per-idioma). DESHABILITADO por defecto: al
# activarlo, TODO el envío de correos de GoTrue pasa por la Edge Function
# supabase/functions/send-email; si falla, el OTP deja de enviarse. Verificar en
# local antes de habilitar, y en prod configurar el hook + secreto en el panel.
#
# Para activar en LOCAL:
#   1) enabled = true (abajo)
#   2) genera un secreto: openssl rand -base64 32  →  secrets = "v1,whsec_<eso>"
#   3) npx supabase functions serve send-email   (o reinicia: stop && start)
#   4) prueba un login: el OTP debe llegar a Mailpit con la skin/idioma del user.
# Si el OTP deja de llegar, vuelve a enabled = false y reinicia.
#
# En PROD: Authentication > Hooks > Send Email → habilitar, apuntar a la función
# desplegada y poner el MISMO secreto (como env SEND_EMAIL_HOOK_SECRET de la
# función). Desplegar la función: npx supabase functions deploy send-email.
[auth.hook.send_email]
enabled = false
uri = "http://host.docker.internal:54321/functions/v1/send-email"
# secrets = "v1,whsec_REEMPLAZAR"

# La función del hook no recibe JWT de usuario: desactiva su verificación.
[functions.send-email]
verify_jwt = false
