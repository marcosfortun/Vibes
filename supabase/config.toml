# Supabase local config — Vibes
# Aplica con: supabase start (requiere Docker) y supabase db reset para correr migraciones.
project_id = "vibecheck"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = false
port = 54323

# Storage no se usa en el MVP; desactivado para evitar el health check que rompe el arranque local.
[storage]
enabled = false

# Analítica (Logflare/Vector) no necesaria para el backend; desactivada por health checks inestables en local.
[analytics]
enabled = false

# Realtime no se usa (sin WebSockets en el diseño); desactivado por health check inestable en local.
[realtime]
enabled = false

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3000/**"]
jwt_expiry = 3600
enable_signup = true

# Sesiones de larga duración: no caducan por inactividad ni por tiempo (el usuario
# entra por OTP, copiar el código a menudo es incómodo). En prod se replica en el
# panel: Authentication > Sessions (time-box e inactivity = nunca).
[auth.sessions]
timebox = "0h"
inactivity_timeout = "0h"

[auth.email]
enable_signup = true
# Sin contraseñas: el alta y el acceso son por Email OTP (código de 6 dígitos). El
# propio OTP valida la propiedad del correo, así que no hace falta doble opt-in.
enable_confirmations = false
otp_length = 6
otp_expiry = 3600
# NOTA despliegue: "Enable email enumeration prevention" es un flag del panel cloud
# (Authentication > Auth Providers > Email), no de config.toml local.

# Correos de GoTrue (el código OTP de alta/acceso). Una sola plantilla corporativa
# en la skin por defecto (Stick stack): en el alta el usuario aún no ha elegido skin
# y GoTrue no conoce la skin de cada usuario. Muestra {{ .Token }} (código), no enlace.
# NOTA despliegue: replicar asunto + HTML y el remitente "Vibes <no-reply@vibes.oneman.es>"
# en el panel (Authentication > Emails > Magic Link y Confirm signup).
[auth.email.template.magic_link]
subject = "Tu código de acceso a Vibes ⚡"
content_path = "./supabase/templates/otp.html"

[auth.email.template.confirmation]
subject = "Tu código de acceso a Vibes ⚡"
content_path = "./supabase/templates/otp.html"
